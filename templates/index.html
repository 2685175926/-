.form-group input:focus{border-color:#1890ff;box-shadow:0 0 0 2px rgba(24,144,255,.2)}
.form-group textarea:focus{border-color:#1890ff;box-shadow:0 0 0 2px rgba(24,144,255,.2)}
.form-group input.small{min-width:80px;width:80px}
.btn{padding:8px 20px;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:500;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#1890ff;color:#fff}
.btn-primary:hover{background:#40a9ff}
.btn-danger{background:#ff4d4f;color:#fff}
.btn-danger:hover{background:#ff7875}
.btn-success{background:#52c41a;color:#fff}
.btn-success:hover{background:#73d13d}
.btn-default{background:#fff;color:#333;border:1px solid #d9d9d9}
.btn-default:hover{border-color:#1890ff;color:#1890ff}
.btn:disabled{opacity:.5;cursor:not-allowed}
.tabs{display:flex;gap:0;border-bottom:2px solid #f0f0f0;margin-bottom:16px}

.tab.active{color:#1890ff;border-bottom-color:#1890ff}
.tab:hover{color:#1890ff}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#fafafa;padding:10px 12px;text-align:left;font-weight:600;color:#555;border-bottom:1px solid #e8e8e8;white-space:nowrap;position:sticky;top:0;z-index:1}
td{padding:8px 12px;border-bottom:1px solid #f0f0f0}
tr:hover td{background:#e6f7ff}

.table-wrap{max-height:500px;overflow-y:auto;border:1px solid #f0f0f0;border-radius:6px}

<div class="container">
<div class="panel"><div class="panel-header">🔐 登录获取 Token</div><div class="panel-body"><div class="form-row">
<div class="form-group"><label>账号</label><input type="text" id="loginUsername" placeholder="输入 ad.adintl.cn 账号" style="min-width:220px"></div>
<div class="form-group"><label>密码</label><input type="password" id="loginPassword" placeholder="输入密码" style="min-width:220px"></div>
<div class="form-group"><label>验证码</label><input type="text" id="loginCaptcha" placeholder="验证码" class="small"></div>
<div class="form-group"><label>点击刷新</label><img id="captchaImage" class="captcha-img" onclick="refreshLoginCaptcha()" alt="验证码"></div>
<div class="form-group" style="align-self:flex-end"><button class="btn btn-default" type="button" onclick="refreshLoginCaptcha()">刷新验证码</button><button class="btn btn-success" id="btnLogin" type="button" onclick="loginAndFillToken()">登录并填入 Token</button></div>
<div class="login-hint" id="loginHint">登录成功后会自动填入下面的 X-Access-Token。</div>
</div></div></div>
<div class="panel"><div class="panel-header">⚙️ 配置</div><div class="panel-body"><div class="form-row">
<div class="form-group"><label>X-Access-Token *</label><input type="text" id="token" placeholder="输入 access token" style="min-width:360px" oninput="updateTokenExpiryStatus()"></div>
<div class="token-expiry" id="tokenExpiryStatus">Token 未填写</div>
<div class="form-group"><label>代理 / Base URL</label><input type="text" id="baseUrl" value="auto" style="min-width:240px"></div>
<div class="form-group"><label>Advertiser ID</label><input type="text" id="advertiserId" value="2099" class="small"></div>
<div class="form-group"><label>轮询间隔 (秒)</label><input type="number" id="interval" value="30" min="5" class="small"></div>
<div class="form-group"><label>加载条数</label><input type="number" id="topN" value="5" min="1" class="small"></div>
<div class="form-group" style="align-self:flex-end"><button class="btn btn-primary" id="btnStart" onclick="startMonitor()">▶ 开始监控</button><button class="btn btn-danger" id="btnStop" onclick="stopMonitor()" disabled>⏹ 停止</button></div>
</div></div></div>
<div class="panel"><div class="panel-header">🎯 阈值监控 & 自动停止</div><div class="panel-body"><div class="form-row">
<div class="form-group"><label>消耗阈值 (元)</label><input type="number" id="threshold" value="100" min="1" step="0.01" style="min-width:120px"></div>
<div class="form-group"><label>检查模式</label><select id="checkMode" style="min-width:160px"><option value="4day">近4日消耗超阈值</option></select></div>
<div class="form-group" style="align-self:flex-end"><label style="visibility:hidden">.</label><div style="display:flex;gap:8px"><button class="btn btn-success" id="btnCheck" onclick="checkThreshold()" disabled>🔍 手动检查一次</button><label style="font-size:12px;display:flex;align-items:center;gap:4px;cursor:pointer"><input type="checkbox" id="autoStop" checked> 自动停止投放</label></div></div>
</div></div></div>
<div class="panel"><div class="panel-header">📨 微信推送</div><div class="panel-body"><div class="form-row">
<div class="form-group"><label>PushPlus Token</label><input type="text" id="pushplusToken" value="801554e2cc654bfd817165d623db219f" placeholder="输入 pushplus token" style="min-width:360px"></div>
<div class="form-group"><label>推送标题</label><input type="text" id="pushTitle" value="章鱼广告监控提醒" style="min-width:220px"></div>
<div class="form-group"><label>推送内容</label><textarea id="pushContent" placeholder="输入要推送到微信的内容">这是一条章鱼监控测试消息</textarea></div>

</div></div></div>

<div id="tabLog" class="tab-content" style="display:none"><div class="log-list" id="logList"><div style="color:#999">暂无日志</div></div></div>
</div></div>
</div>

// ==================== X-Sign Algorithm ====================
var SALT = "dd05f1c54d63749eda95f9fa6d49v442a";

function myIsNaN(val){ return typeof val === 'number' && !isNaN(val); }

function parseQueryString(url){
  var result = {};
  var qsIndex = url.indexOf('?');
  if(qsIndex >= 0){
    var qs = url.substring(qsIndex + 1);
    var regex = /([^&=]+)=([\w\W]*?)(&|$|#)/g;
    var match;
    while((match = regex.exec(qs)) !== null){
      var val = match[2];
      if(myIsNaN(Number(val))) val = val.toString();
      result[match[1]] = val;
    }
  }
  var pathNoQS = qsIndex >= 0 ? url.substring(0, qsIndex) : url;
  var lastSeg = pathNoQS.substring(pathNoQS.lastIndexOf('/') + 1);
  if(lastSeg.includes(',')){
    if(lastSeg.includes('?')) lastSeg = lastSeg.substring(0, lastSeg.indexOf('?'));
    result["x-path-variable"] = decodeURIComponent(lastSeg);
  }
  return result;
}

function mergeObject(obj1, obj2){
  var result = {};
  for(var k in obj1){ if(obj1.hasOwnProperty(k)) result[k] = obj1[k]; }
  if(obj2 && Object.keys(obj2).length > 0){
    for(var key in obj2){
      if(obj2.hasOwnProperty(key)){
        var val = obj2[key];
        if(myIsNaN(val)) val = val.toString();
        result[key] = val;
      }
    }
  }
  return result;
}

function sortAsc(obj){
  var keys = Object.keys(obj).sort();
  var sorted = {};
  for(var i = 0; i < keys.length; i++) sorted[keys[i]] = obj[keys[i]];
  return sorted;
}

function getSign(url, data){
  var p = parseQueryString(url);
  var m = mergeObject(p, data || null);
  var s = sortAsc(m);
  return MD5(JSON.stringify(s) + SALT).toUpperCase();
}

// ==================== UI辅助 ====================
function setStatus(s, cls){
  var t = {'online':'在线','offline':'就绪','loading':'加载中...'}[cls]||'';
  document.getElementById('statusText').textContent = (s||t);
  var dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + cls;
}

function log(msg, type){
  var lst = document.getElementById('logList');
  if(lst.children[0] && lst.children[0].textContent === '暂无日志') lst.innerHTML = '';
  var now = new Date();
  var time = now.toTimeString().substring(0,8);
  var div = document.createElement('div');
  div.className = 'log-item';
  div.innerHTML = '<span class="log-time">'+time+'</span><span class="log-'+type+'">'+msg+'</span>';
  lst.insertBefore(div, lst.firstChild);
  if(lst.children.length > 500) lst.removeChild(lst.lastChild);
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('tabTotal').style.display='none';
  document.getElementById('tabDaily').style.display='none';
  document.getElementById('tabLog').style.display='none';
  if(tab === 'total'){ document.querySelectorAll('.tab')[0].classList.add('active'); document.getElementById('tabTotal').style.display=''; }
  else if(tab === 'daily'){ document.querySelectorAll('.tab')[1].classList.add('active'); document.getElementById('tabDaily').style.display=''; }
  else if(tab === 'log'){ document.querySelectorAll('.tab')[2].classList.add('active'); document.getElementById('tabLog').style.display=''; }
}

function getConfiguredBaseUrl(){
  var input = document.getElementById('baseUrl');
  var value = input ? input.value.trim() : '';
  if(!value || value.toLowerCase() === 'auto'){
    return window.location.protocol === 'file:' ? 'http://127.0.0.1:8899/api' : '/api';
  }
  return (value || '/api').replace(/\/+$/,'');
}

function getPushplusUrl(){
  return window.location.protocol === 'file:' ? 'http://127.0.0.1:8899/pushplus/send' : '/pushplus/send';
}

async function sendPushplusMessage(title, content){
  var pushToken = document.getElementById('pushplusToken').value.trim();
  if(!pushToken) throw new Error('请输入 PushPlus Token');
  var resp = await fetch(getPushplusUrl(), {
    method: 'POST',
    headers: {
      'Accept': 'application/json',
      'Content-Type': 'application/json;charset=UTF-8'
    },
    body: JSON.stringify({
      token: pushToken,

function decodeJwtPayload(jwt){
  try {
    var parts = String(jwt || '').split('.');
    if(parts.length < 2) return null;
    var base64 = parts[1].replace(/-/g, '+').replace(/_/g, '/');
    while(base64.length % 4) base64 += '=';
    var json = decodeURIComponent(Array.prototype.map.call(atob(base64), function(c){
      return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));
    return JSON.parse(json);
  } catch(e) {
    return null;
  }
}

function formatDuration(ms){
  if(ms <= 0) return '已过期';
  var totalSeconds = Math.floor(ms / 1000);
  var days = Math.floor(totalSeconds / 86400);
  var hours = Math.floor((totalSeconds % 86400) / 3600);
  var minutes = Math.floor((totalSeconds % 3600) / 60);
  if(days > 0) return days + '天 ' + hours + '小时';
  if(hours > 0) return hours + '小时 ' + minutes + '分钟';
  return minutes + '分钟';
}

function updateTokenExpiryStatus(){
  var tokenInput = document.getElementById('token');
  var status = document.getElementById('tokenExpiryStatus');
  var jwt = tokenInput ? tokenInput.value.trim() : '';
  if(!status) return;
  if(!jwt){
    status.textContent = 'Token 未填写';
    status.style.color = '#666';
    tokenExpiryWarned = false;
    return;
  }
  var payload = decodeJwtPayload(jwt);
  if(!payload || !payload.exp){
    status.textContent = 'Token 格式无法解析';
    status.style.color = '#faad14';
    return;
  }
  var expiresAt = payload.exp * 1000;
  var remainMs = expiresAt - Date.now();
  var expireText = new Date(expiresAt).toLocaleString();
  if(remainMs <= 0){
    status.textContent = 'Token 已过期，请重新登录';
    status.style.color = '#ff4d4f';
    if(!tokenExpiryWarned){
      tokenExpiryWarned = true;
      log('Token 已过期，请重新登录获取新 Token', 'warn');
      refreshLoginCaptcha();
    }
    return;
  }
  status.textContent = 'Token 到期: ' + expireText + '，剩余 ' + formatDuration(remainMs);
  status.style.color = remainMs <= 5 * 60 * 1000 ? '#faad14' : '#389e0d';
  if(remainMs <= 5 * 60 * 1000 && !tokenExpiryWarned){
    tokenExpiryWarned = true;
    log('Token 即将过期，请重新登录获取新 Token', 'warn');
    refreshLoginCaptcha();
  }
  if(remainMs > 5 * 60 * 1000) tokenExpiryWarned = false;
}

function isTokenExpired(jwt){
  var payload = decodeJwtPayload(jwt);
  return !!(payload && payload.exp && payload.exp * 1000 <= Date.now());
}

async function refreshLoginCaptcha(){
  loginCheckKey = String(Date.now());
  var img = document.getElementById('captchaImage');
  var hint = document.getElementById('loginHint');
  if(hint) hint.textContent = '正在刷新验证码...';
  try {
    var resp = await fetch(getConfiguredBaseUrl() + '/jeecg-boot/sys/randomImage/' + loginCheckKey, {
      headers: { 'Accept': 'application/json' }
    });
    var data = await resp.json();
    if(!data.success) throw new Error(data.message || '验证码获取失败');
    if(img) img.src = data.result;
    if(hint) hint.textContent = '请输入账号、密码和验证码后登录。';
  } catch(e) {
    if(hint) hint.textContent = '验证码获取失败: ' + e.message;
    log('验证码获取失败: ' + e.message, 'error');
  }
}

async function loginAndFillToken(){
  var username = document.getElementById('loginUsername').value.trim();
  var password = document.getElementById('loginPassword').value;
  var captcha = document.getElementById('loginCaptcha').value.trim();
  var hint = document.getElementById('loginHint');
  var btn = document.getElementById('btnLogin');
  if(!username || !password || !captcha){ alert('请输入账号、密码和验证码'); return; }
  if(!loginCheckKey){ await refreshLoginCaptcha(); }
  if(btn) btn.disabled = true;
  if(hint) hint.textContent = '正在登录...';
  try {
    var resp = await fetch(getConfiguredBaseUrl() + '/jeecg-boot/sys/login', {
      method: 'POST',
      headers: {
        'Accept': 'application/json',
        'Content-Type': 'application/json;charset=UTF-8'
      },
      body: JSON.stringify({
        username: username,
        password: password,
        captcha: captcha,
        checkKey: loginCheckKey,
        remember_me: true,
        dspDeclaration: true
      })
    });
    var data = await resp.json();
    if(!(data.success || data.code == 200 || data.code == '200')) throw new Error(data.message || '登录失败');
    var result = data.result || {};
    var newToken = result.token || data.token;
    if(!newToken) throw new Error('登录成功但返回中没有 token');
    document.getElementById('token').value = newToken;
    tokenExpiryWarned = false;
    updateTokenExpiryStatus();
    document.getElementById('loginPassword').value = '';
    document.getElementById('loginCaptcha').value = '';
    if(hint) hint.textContent = '登录成功，Token 已填入。';
    log('登录成功，Token 已自动填入', 'success');
    await refreshLoginCaptcha();
  } catch(e) {
    if(hint) hint.textContent = '登录失败: ' + e.message;
    log('登录失败: ' + e.message, 'error');
    await refreshLoginCaptcha();
  } finally {
    if(btn) btn.disabled = false;
  }
}

// ==================== API请求 ====================
var requestId = 0;

async function apiGet(path, params){
  var reqId = ++requestId;
  var sign = getSign(path, params || null);
  var ts = getTimestamp();
  var fullUrl = baseUrl + path;
  if(params){
    var qs = Object.keys(params).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);}).join('&');
    fullUrl += '?' + qs;
  }
  var resp = await fetch(fullUrl, {
    headers: {
      'Accept': 'application/json',
      'X-Access-Token': token,
      'X-Sign': sign,
      'X-TIMESTAMP': ts,
      'advertiserId': advertiserId,
      'tenant-id': '0'
    }
  });
  var data;
  try { data = await resp.json(); } catch(e) { throw new Error('响应非JSON (状态:'+resp.status+'): '+ (await resp.text()).substring(0,200)); }
  if(!data.success) throw new Error((data.message||'API错误') + ' (code:'+(data.code||resp.status)+')');
  return data.result;
}

async function apiPost(path, body){
  var sign = getSign(path, body);
  var ts = getTimestamp();
  var fullUrl = baseUrl + path;
  var resp = await fetch(fullUrl, {
    method: 'POST',
    headers: {
      'Accept': 'application/json',
      'Content-Type': 'application/json;charset=UTF-8',
      'X-Access-Token': token,
      'X-Sign': sign,
      'X-TIMESTAMP': ts,
      'advertiserId': advertiserId,
      'tenant-id': '0'
    },
    body: JSON.stringify(body)
  });
  var data = await resp.json();
  if(!data.success) throw new Error(data.message || 'API error');
  return data.result;
}

// ==================== 数据获取 ====================
async function fetchAllData(){
  setStatus('加载中...', 'loading');
  var today = new Date().toISOString().substring(0,10);

  // 获取总消耗 (material list) - 分页
  var totalData = [];
  var pageNo = 1, hasMore = true;
  var loadLimit = parseInt(document.getElementById('topN').value) || 5;
  while(hasMore && totalData.length < loadLimit){
    var remaining = loadLimit - totalData.length;
    var ps = Math.min(remaining, 100);
    var totalResult = await apiGet('/jeecg-boot/ad/adcreative/material/list', {
      column: 'createdAt', order: 'desc',
      field: 'id,,,id,title,status_dictText,deeplink,landingPage,allConsume,allImp,allClick,clickRate,clickCost,clkLimit,action',
      pageNo: String(pageNo), pageSize: String(ps)
    });
    var records = totalResult.records || [];
    totalData = totalData.concat(records);
    pageNo++;
    if(records.length < ps) hasMore = false;
    log('获取总消耗第'+(pageNo-1)+'页: '+records.length+'条 (已加载'+totalData.length+'/'+loadLimit+')', 'info');
  }

  // 获取近4日消耗 (今天 + 前3天)
  var dailyData = [];
    var todayDate = new Date(today + 'T00:00:00+08:00');
  var startDate = new Date(todayDate);
  startDate.setDate(startDate.getDate() - 3);
  var rangeStart = startDate.toISOString().substring(0,10);
  log('读取日期范围: ' + rangeStart + ' ~ ' + today, 'info');
  var loadLimit = parseInt(document.getElementById('topN').value) || 5;
  pageNo = 1; hasMore = true;
  while(hasMore && dailyData.length < loadLimit){
    var ps = Math.min(loadLimit - dailyData.length, 100);
    var dailyResult = await apiGet('/jeecg-boot/report/materialReport/list', {
      startDate: rangeStart, endDate: today,
      column: 'id', order: 'desc',
      field: 'dat,title,materialId,imp,clk,consume',
      pageNo: String(pageNo), pageSize: String(ps)
    });
    records = dailyResult.records || [];
    dailyData = dailyData.concat(records);
    pageNo++;
    if(records.length < ps) hasMore = false;
    log('获取近4日消耗第'+(pageNo-1)+'页: '+records.length+'条', 'info');
  }

  // 汇总近4日消耗 (过滤合计行)
  var dailyAgg = {};
  for(var i = 0; i < dailyData.length; i++){
    var d = dailyData[i];
    var mid = d.materialId || d.id;
    if(mid === '合计' || !mid) continue;
    if(!dailyAgg[mid]) dailyAgg[mid] = {materialId: mid, title: d.title, consume: 0, imp: 0, clk: 0};
    dailyAgg[mid].consume += Number(d.consume||0);
    dailyAgg[mid].imp += Number(d.imp||0);
    dailyAgg[mid].clk += Number(d.clk||0);
  }

  // 合并总消耗 + 每日
  var merged = {};
  for(i = 0; i < totalData.length; i++){
    var t = totalData[i];
    var tid = String(t.id);
    merged[tid] = {
      id: tid, title: t.title || '',
      status: t.status_dictText || '', statusCode: t.status || '',
      allConsume: Number(t.allConsume||0), allImp: Number(t.allImp||0),
      allClick: Number(t.allClick||0), clickRate: t.clickRate||'0', clickCost: t.clickCost||'0',
      todayConsume: 0, todayImp: 0, todayClick: 0
    };
  }
  for(var mid in dailyAgg){
    if(!merged[mid]){
      merged[mid] = {id: mid, title: dailyAgg[mid].title, status: '未知', statusCode: '1',
        allConsume: 0, allImp: 0, allClick: 0, clickRate:'0', clickCost:'0',
        todayConsume: 0, todayImp: 0, todayClick: 0};
    }
    merged[mid].todayConsume = dailyAgg[mid].consume;
    merged[mid].todayImp = dailyAgg[mid].imp;
    merged[mid].todayClick = dailyAgg[mid].clk;
  }

  var ranked = Object.values(merged).sort(function(a,b){return b.allConsume - a.allConsume;});
  window._rankedData = ranked;

  // 汇总卡片
  var totalAll = ranked.reduce(function(s,r){return s+r.allConsume;},0);
  var totalToday = ranked.reduce(function(s,r){return s+r.todayConsume;},0);
  var activeCnt = ranked.filter(function(r){return r.statusCode == '1';}).length;
  var stoppedCnt = ranked.filter(function(r){return r.statusCode == '2';}).length;
  document.getElementById('summaryCards').innerHTML = '<div class="summary-card"><div class="value">'+ranked.length+'</div><div class="label">创意总数</div></div><div class="summary-card"><div class="value">'+activeCnt+'</div><div class="label">投放中</div></div><div class="summary-card"><div class="value">'+stoppedCnt+'</div><div class="label">已停止</div></div><div class="summary-card"><div class="value">¥'+totalAll.toFixed(2)+'</div><div class="label">历史总消耗</div></div><div class="summary-card"><div class="value">¥'+totalToday.toFixed(2)+'</div><div class="label">近4日总消耗</div></div>';

  // 总消耗排行表
  var threshold = parseFloat(document.getElementById('threshold').value)||0;
  var totalHtml = '';
  for(i = 0; i < ranked.length; i++){
    var r = ranked[i];
    var rankCls = i<3 ? 'rank-'+(i+1) : 'rank-other';
    var rowCls = '', badge = '';
    if(r.statusCode == '2'){ rowCls = 'stopped-row'; badge = '<span class="badge badge-stopped">已停止</span>'; }
    else if(threshold > 0 && r.todayConsume >= threshold){ rowCls = 'alert-row'; badge = '<span class="badge badge-warning">超阈值</span>'; }
    else { badge = '<span class="badge badge-active">投放中</span>'; }
    totalHtml += '<tr class="'+rowCls+'"><td><span class="rank '+rankCls+'">'+(i+1)+'</span></td><td>'+r.id+'</td><td>'+r.title+'</td><td class="num">¥'+r.allConsume.toFixed(2)+'</td><td class="num">'+r.allImp.toLocaleString()+'</td><td class="num">'+r.allClick.toLocaleString()+'</td><td class="num">'+r.clickRate+'%</td><td class="num">¥'+(Number(r.clickCost)||0).toFixed(4)+'</td><td>'+badge+'</td></tr>';
  }
  document.getElementById('totalTbody').innerHTML = totalHtml || '<tr><td colspan="9" style="text-align:center;color:#999;padding:40px">无数据</td></tr>';

  // 近4日消耗明细表
  var dailyRows = Object.values(dailyAgg).sort(function(a,b){return b.consume - a.consume;});
  var dailyHtml = '';
  for(i = 0; i < dailyRows.length; i++){
    var dr = dailyRows[i];
    var clkRate = dr.imp > 0 ? (dr.clk/dr.imp*100).toFixed(2) : '0.00';
    var cpc = dr.clk > 0 ? (dr.consume/dr.clk).toFixed(2) : '0.00';
    var cpm = dr.imp > 0 ? (dr.consume/dr.imp*1000).toFixed(2) : '0.00';
    dailyHtml += '<tr><td>'+dr.materialId+'</td><td>'+dr.title+'</td><td>'+today+'</td><td class="num">¥'+dr.consume.toFixed(2)+'</td><td class="num">'+dr.imp.toLocaleString()+'</td><td class="num">'+dr.clk.toLocaleString()+'</td><td class="num">'+clkRate+'%</td><td class="num">¥'+cpc+'</td><td class="num">¥'+cpm+'</td></tr>';
  }
  document.getElementById('dailyTbody').innerHTML = dailyHtml || '<tr><td colspan="9" style="text-align:center;color:#999;padding:40px">近4日无消耗数据</td></tr>';

  setStatus('在线', 'online');
  document.getElementById('lastUpdate').textContent = '最后更新: ' + new Date().toLocaleTimeString();
}

function getThreshold(){ return parseFloat(document.getElementById('threshold').value) || 0; }

// ==================== 自动停止 ====================
async function stopMaterial(matId, reason){
  try {
    await apiPost('/jeecg-boot/ad/adcreative/material/edit', { id: String(matId), status: '2', reason: reason || '阈值超限自动停止' });
    stoppedIds[matId] = true;
    log('✅ 已停止创意ID: '+matId+' ('+(reason||'阈值超限')+')', 'success');
    return true;
  } catch(e){ log('❌ 停止失败 '+matId+': '+e.message, 'error'); return false; }
}

async function checkThreshold(){
  var threshold = getThreshold();
  var auto = document.getElementById('autoStop').checked;
  var data = window._rankedData || [];
  if(data.length === 0){ log('无数据，请先获取数据', 'warn'); return; }
  log('🔍 阈值检查: 近4日消耗 > ¥'+threshold, 'info');
  var stopped = 0;
  for(var i = 0; i < data.length; i++){
    var r = data[i];
    if(r.statusCode == '2' || stoppedIds[r.id]) continue;
    if(r.todayConsume >= threshold){
      log('⚠️ 创意 '+r.id+' ('+r.title+') 近4日消耗 ¥'+r.todayConsume.toFixed(2)+' 超阈值', 'warn');
      if(auto){ var ok = await stopMaterial(r.id); if(ok) stopped++; }
    }
  }
  if(stopped > 0) log('🏁 自动停止 '+stopped+' 个创意', 'success');
  else if(auto) log('✅ 检查完成，无需停止', 'info');
  await fetchAllData();
}

async function checkThresholdInternal(){
  var threshold = getThreshold();
  var data = window._rankedData || [];
  if(data.length === 0) return;
  for(var i = 0; i < data.length; i++){
    var r = data[i];
    if(r.statusCode == '2' || stoppedIds[r.id]) continue;
    if(r.todayConsume >= threshold){
      log('⚠️ 自动停止: 创意 '+r.id+' ('+r.title+') 近4日消耗 ¥'+r.todayConsume.toFixed(2)+' > ¥'+threshold, 'warn');
      await stopMaterial(r.id);
    }
  }
}

// ==================== 监控循环 ====================
var monitorTimer = null;

async function startMonitor(){
  token = document.getElementById('token').value.trim();
  if(!token){ alert('请输入 X-Access-Token'); return; }
  if(isTokenExpired(token)){ alert('Token 已过期，请重新登录获取新 Token'); refreshLoginCaptcha(); return; }
  baseUrl = getConfiguredBaseUrl();
  advertiserId = document.getElementById('advertiserId').value.trim() || '2099';
  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStop').disabled = false;
  document.getElementById('btnCheck').disabled = false;
  log('🚀 启动监控...', 'info');
  try {
    await fetchAllData();
    if(document.getElementById('autoStop').checked) await checkThresholdInternal();
  } catch(e){
    log('❌ 数据获取失败: '+e.message, 'error');
    setStatus('错误: '+e.message.substring(0,30), 'offline');
  }
  var interval = parseInt(document.getElementById('interval').value) || 30;
  monitorTimer = setInterval(async function(){
    try {
      await fetchAllData();
      if(document.getElementById('autoStop').checked) await checkThresholdInternal();
    } catch(e){ log('❌ 轮询失败: '+e.message, 'error'); setStatus('轮询错误', 'offline'); }
  }, interval * 1000);
  log('⏱ 轮询已启动，间隔 '+interval+' 秒', 'info');
}

function stopMonitor(){
  if(monitorTimer){ clearInterval(monitorTimer); monitorTimer = null; }
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStop').disabled = true;
  document.getElementById('btnCheck').disabled = true;
  setStatus('已停止', 'offline');
  log('⏸ 监控已停止', 'info');
}

  refreshLoginCaptcha();
  updateTokenExpiryStatus();
  tokenExpiryTimer = setInterval(updateTokenExpiryStatus, 30000);
});
